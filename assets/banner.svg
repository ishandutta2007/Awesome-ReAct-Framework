<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff7e5f;stop-opacity:1">
        <animate attributeName="stop-color" values="#ff7e5f;#feb47b;#ff7e5f" dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" style="stop-color:#feb47b;stop-opacity:1">
        <animate attributeName="stop-color" values="#feb47b;#86a8e7;#feb47b" dur="4s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="15" ry="15" fill="url(#grad1)" />
  <g transform="translate(400, 100)">
    <text x="0" y="-10" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="bold" fill="url(#textGrad)" text-anchor="middle" dominant-baseline="middle">Awesome ReAct Framework</text>
    <text x="0" y="40" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" dominant-baseline="middle" opacity="0.9">Reasoning + Acting</text>
    <animateTransform attributeName="transform" type="translate" values="400,95; 400,105; 400,95" dur="3s" repeatCount="indefinite" />
  </g>
  <circle cx="100" cy="50" r="10" fill="#ffffff" opacity="0.5">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="700" cy="150" r="15" fill="#ffffff" opacity="0.5">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="150" cy="160" r="8" fill="#ffffff" opacity="0.5">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" repeatCount="indefinite" />
  </circle>
</svg>
